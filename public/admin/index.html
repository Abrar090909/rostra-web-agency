<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rostra CRM — Business Management</title>
  <meta name="description" content="Rostra CRM - Premium business management and client tracking system">
  <link rel="icon" type="image/png" href="/logo_cropped.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.css">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="crm-app" class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">R</div>
        <span class="logo-text">Rostra CRM</span>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-user">
        <div class="user-avatar">AB</div>
        <div class="user-info">
          <div class="user-name">Abrar Ahmed</div>
          <div class="user-role">Admin · Founder</div>
        </div>
        <button class="user-menu-btn"><i data-lucide="more-horizontal"></i></button>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="overlay" id="mobile-overlay"></div>

    <!-- Topbar -->
    <header class="topbar" id="topbar">
      <button class="mobile-menu-btn" id="mobile-menu-btn">
        <i data-lucide="menu"></i>
      </button>
      <span class="topbar-title" id="topbar-title">Dashboard</span>
      <div class="topbar-spacer"></div>
      <div class="topbar-search">
        <i data-lucide="search"></i>
        <input type="text" placeholder="Search clients, projects..." id="global-search">
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="notif-btn" style="position:relative">
          <i data-lucide="bell"></i>
          <span class="notif-dot"></span>
          <div class="notif-dropdown" id="notif-dropdown">
            <div class="notif-dropdown-header">Notifications</div>
            <div class="notif-dropdown-body" id="notif-list"></div>
          </div>
        </button>
        <div class="topbar-avatar" id="topbar-avatar">AB</div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="main-content"></main>
  </div>

  <!-- Drawer (Add/Edit Client) -->
  <div class="overlay" id="drawer-overlay"></div>
  <div class="drawer" id="client-drawer">
    <div class="drawer-header">
      <span class="drawer-title" id="drawer-title">Add Client</span>
      <button class="drawer-close" id="drawer-close"><i data-lucide="x"></i></button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" id="drawer-cancel">Cancel</button>
      <button class="btn btn-primary" id="drawer-save">Save Client</button>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div class="confirm-dialog" id="confirm-dialog">
    <div class="confirm-overlay"></div>
    <div class="confirm-box">
      <div class="confirm-icon" id="confirm-icon" style="background:var(--red-dim);color:var(--red)"><i data-lucide="trash-2"></i></div>
      <h3 id="confirm-title">Delete Client?</h3>
      <p id="confirm-message">This action cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn btn-secondary" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
